spring:
  datasource:
    url: jdbc:mysql://localhost:3306/travel_booking?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

jwt:
  secret: travel-booking-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000
